<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenteLuz - Web App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- ... ESTILOS ORIGINALES AQUÍ ... -->
    <style>
        /* ... (pon aquí tu CSS original, se omite aquí por espacio) ... */
        /* ... pega exactamente tu bloque <style> del mensaje anterior ... */
    </style>
</head>
<body>

    <div class="app-container" id="main-container">
        
        <!-- ... TU CONTENIDO ORIGINAL ... -->

        <div id="view-home" class="view active">
            <header class="header">
                <div class="logo">
                    MENTELUZ <i class="fa-solid fa-fire-flame-simple"></i>
                </div>
                <p class="subtitle">Bienvenido a MenteLuz.<br>Escanea para conectar.</p>
                <button class="btn-main">INICIAR SESIÓN</button>
            </header>

            <main>
                <div class="grid-menu">
                    <div class="card" id="btn-open-test">
                        <i class="fa-solid fa-heart-circle-bolt"></i>
                        <p>Test de Estrés</p>
                    </div>
                    <div class="card" id="btn-open-playlists">
                        <i class="fa-solid fa-headphones-simple"></i>
                        <p>Playlists para<br>Relajarse</p>
                    </div>
                    <div class="card" id="btn-open-techniques">
                        <i class="fa-solid fa-hands-holding-circle"></i>
                        <p>Técnicas de<br>Relajación</p>
                    </div>
                    <div class="card" id="btn-open-tasks">
                        <i class="fa-solid fa-clipboard-list"></i>
                        <p>Organizador de<br>Tareas (Lab. y Univ.)</p>
                    </div>
                </div>

                <!-- ¡AQUÍ ESTÁ TU BOTÓN DE HORA DE RELAJARSE! -->
                <div class="wide-card">
                    <i class="fa-solid fa-clock"></i>
                    <p>Hora de Relajarse<br>(Programar)</p>
                </div>
            </main>
        </div>
        
        <!-- ... RESTO DE TU APP (TASKS, PLAYLISTS, ETC.) ... -->

        <!-- MODAL PROGRAMAR RELAJACIÓN -->
        <div id="modal-relax" style="display:none; position: fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(30,70,64,0.15); z-index:9999; align-items:center; justify-content:center;">
          <div style="background: #fff; padding: 30px 20px; border-radius: 25px; box-shadow: 0 8px 30px rgba(30,70,64,0.25); max-width: 320px; width: 95%; text-align: center; position:relative;">
            <h3 style="font-size:20px; margin-bottom: 15px; color:#1e4640;">Programa tu Hora de Relajación</h3>
            <label for="relax-day" style="font-weight:600; font-size:13px;">Día</label>
            <select id="relax-day" style="width:100%; border-radius: 10px; margin:10px 0 18px; padding:8px;">
              <option>Lunes</option><option>Martes</option><option>Miércoles</option>
              <option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
            </select>
            <label for="relax-time" style="font-weight:600; font-size:13px;">Hora</label>
            <input type="time" id="relax-time" style="width:100%; border-radius:10px; margin:10px 0 18px; padding:8px;">
            <div style="display:flex;gap:10px;justify-content:center;">
              <button id="btn-confirm-relax" class="btn-main" style="width:50%;">Confirmar</button>
              <button id="btn-cancel-relax" class="btn-main" style="background: #eee; color: #333; width:40%;">Cancelar</button>
            </div>
          </div>
        </div>

        <!-- ... EL RESTO DE TU HTML ... -->

        <!-- Tu navegación inferior, etc... -->
        <nav class="bottom-nav">
            <!-- ... -->
        </nav>
    </div>

    <script>
        // ... TU SCRIPT ORIGINAL AQUÍ ...
        // PEGA el código de tu <script> original aquí (mantén toda la lógica de navegación, temporizador, tareas...)

        // --- PROGRAMAR HORA DE RELAJARSE ---

        const btnRelax = document.querySelector('.wide-card');
        const modalRelax = document.getElementById('modal-relax');
        const btnConfirmRelax = document.getElementById('btn-confirm-relax');
        const btnCancelRelax = document.getElementById('btn-cancel-relax');
        const relaxDay = document.getElementById('relax-day');
        const relaxTime = document.getElementById('relax-time');

        // Abrir modal al pulsar "Hora de Relajarse"
        if(btnRelax){
            btnRelax.addEventListener('click', (e) => {
                e.preventDefault();
                modalRelax.style.display = 'flex';
            });
        }

        // Cerrar modal
        btnCancelRelax.addEventListener('click', () => {
            modalRelax.style.display = 'none';
        });

        // Confirmar y felicitar
        btnConfirmRelax.addEventListener('click', () => {
            const day = relaxDay.value;
            const time = relaxTime.value;
            if(!time){
                alert("Por favor, selecciona una hora para relajarte.");
                return;
            }
            // Formatea la hora a formato 24h
            const [h, m] = time.split(':');
            const horaFormateada = `${h.padStart(2, '0')}:${m.padStart(2, '0')}`;
            alert(`¡Felicidades! 🎉\n\nHas programado tu momento de relajación para el ${day} a las ${horaFormateada}.\n¡Felicitaciones por dedicarte este tiempo!`);
            modalRelax.style.display = 'none';
        });

        // (No olvides tu script normal de navegación, temporizadores, tareas, etc...)

    </script>
</body>
</html>
