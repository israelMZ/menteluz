<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenteLuz - Web App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #FAEEE0; --text-dark: #1F2A38; --gold-light: #E4C092; --gold-dark: #B98B58; --white: #FFFFFF; --mint-bg: #dcf0eb; --teal-dark: #1e4640; --teal-btn: #4ea896; --teal-light: #a8d5cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; height: 850px; max-height: 100vh; background-color: var(--bg-color); position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 40px; border: 8px solid #333; transition: background-color 0.3s ease; }
        .view { display: none; animation: fadeIn 0.3s ease-in-out; padding-bottom: 120px; height: 100%; overflow-y: auto; overflow-x: hidden; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .header { text-align: center; padding: 40px 20px 20px; }
        .logo { font-family: 'Cinzel', serif; font-size: 28px; color: var(--text-dark); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: linear-gradient(to right, var(--gold-light), var(--gold-dark)); color: var(--white); border: none; width: 90%; padding: 15px; border-radius: 30px; font-weight: 700; cursor: pointer; display: block; margin: 0 auto 30px; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-bottom: 15px; }
        .card { background-color: var(--white); border-radius: 20px; padding: 20px 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .wide-card { background-color: var(--white); margin: 0 20px 20px; border-radius: 20px; padding: 15px 20px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); display: flex; justify-content: space-between; align-items: flex-end; padding: 10px 20px 20px; border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 999; }
        
        /* ESTILOS NUEVOS (NO BORRAN NADA) */
        .schedule-form { display: none; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .schedule-form input { width: 100%; padding: 8px; margin: 5px 0; border-radius: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="app-container" id="main-container">
        <div id="view-home" class="view active">
            <header class="header">
                <div class="logo">MENTELUZ <i class="fa-solid fa-fire-flame-simple"></i></div>
                <button class="btn-main">INICIAR SESIÓN</button>
            </header>
            <main>
                <div class="grid-menu">
                    <div class="card" id="btn-open-test"><i class="fa-solid fa-heart-circle-bolt"></i><p>Test</p></div>
                    <div class="card" id="btn-open-playlists"><i class="fa-solid fa-headphones-simple"></i><p>Playlists</p></div>
                    <div class="card" id="btn-open-techniques"><i class="fa-solid fa-hands-holding-circle"></i><p>Técnicas</p></div>
                    <div class="card" id="btn-open-tasks"><i class="fa-solid fa-clipboard-list"></i><p>Tareas</p></div>
                </div>
                
                <div class="wide-card" id="btn-toggle-schedule">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fa-solid fa-clock" style="font-size: 28px; color: var(--gold-dark);"></i>
                        <p style="font-size: 13px; font-weight: 600;">Hora de Relajarse (Programar)</p>
                    </div>
                    <div id="schedule-form" class="schedule-form">
                        <input type="date">
                        <input type="time">
                        <button class="btn-main" style="width: 100%; margin: 5px 0 0 0;" onclick="alert('Programado')">GUARDAR</button>
                    </div>
                </div>
            </main>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i><span>Inicio</span></a>
            <a href="#" class="nav-item"><i class="fa-regular fa-user"></i><span>Perfil</span></a>
            <div class="nav-item"><div style="background:var(--gold-dark); width:50px; height:50px; border-radius:50%; display:flex; justify-content:center; align-items:center;"><i class="fa-solid fa-spa" style="color:#fff;"></i></div></div>
            <a href="#" class="nav-item"><i class="fa-solid fa-om"></i><span>Modo</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i><span>Ajustes</span></a>
        </nav>
    </div>

    <script>
        // LÓGICA DE PROGRAMACIÓN
        const btnToggle = document.getElementById('btn-toggle-schedule');
        const form = document.getElementById('schedule-form');
        btnToggle.addEventListener('click', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
                form.style.display = (form.style.display === 'block') ? 'none' : 'block';
            }
        });

        // [PEGA AQUÍ EL RESTO DE TU SCRIPT ORIGINAL COMPLETO]
    </script>
</body>
</html>
