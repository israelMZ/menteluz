<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenteLuz - Web App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #FAEEE0; --text-dark: #1F2A38; --gold-light: #E4C092; --gold-dark: #B98B58; --white: #FFFFFF; --mint-bg: #dcf0eb; --teal-dark: #1e4640; --teal-btn: #4ea896; --teal-light: #a8d5cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; height: 850px; max-height: 100vh; background-color: var(--bg-color); position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 40px; border: 8px solid #333; }
        .view { display: none; padding-bottom: 120px; height: 100%; overflow-y: auto; }
        .view.active { display: block; }
        .header { text-align: center; padding: 40px 20px 20px; }
        .btn-main { background: linear-gradient(to right, var(--gold-light), var(--gold-dark)); color: var(--white); border: none; width: 90%; padding: 15px; border-radius: 30px; font-weight: 700; cursor: pointer; display: block; margin: 0 auto 30px; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; }
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.95); display: flex; justify-content: space-around; padding: 15px; z-index: 999; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; text-decoration: none; font-size: 10px; }
        .nav-item.active { color: var(--gold-dark); }
        .nav-center .circle { background: var(--gold-dark); width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; margin-top: -30px; }
    </style>
</head>
<body>
    <div class="app-container" id="main-container">
        <div id="view-home" class="view active">
            <header class="header">
                <h1>MENTELUZ</h1>
                <button class="btn-main">INICIAR SESIÓN</button>
            </header>
            <main>
                <div class="grid-menu">
                    <div class="card" id="btn-open-test"><p>Test Estrés</p></div>
                    <div class="card" id="btn-open-playlists"><p>Playlists</p></div>
                    <div class="card" id="btn-open-techniques"><p>Técnicas</p></div>
                    <div class="card" id="btn-open-tasks"><p>Tareas</p></div>
                </div>
            </main>
        </div>
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" id="nav-home"><i class="fa-solid fa-house"></i><span>Inicio</span></a>
            <a href="#" class="nav-item"><i class="fa-regular fa-user"></i><span>Perfil</span></a>
            <div class="nav-item nav-center"><div class="circle"><i class="fa-solid fa-spa"></i></div></div>
            <a href="#" class="nav-item"><i class="fa-solid fa-om"></i><span>Meditación</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i><span>Ajustes</span></a>
        </nav>
    </div>
    <script>
        // Lógica para cambiar de vistas
        const hideAll = () => document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('btn-open-tasks').addEventListener('click', () => { hideAll(); document.getElementById('view-tasks').classList.add('active'); });
        document.getElementById('nav-home').addEventListener('click', () => { hideAll(); document.getElementById('view-home').classList.add('active'); });
    </script>
</body>
</html>
