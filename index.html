<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenteLuz - Web App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #FAEEE0;
            --text-dark: #1F2A38;
            --gold-light: #E4C092;
            --gold-dark: #B98B58;
            --white: #FFFFFF;
            --mint-bg: #dcf0eb;
            --teal-dark: #1e4640;
            --teal-btn: #4ea896;
            --teal-light: #a8d5cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor Principal (Fijo) */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 850px;
            max-height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 40px;
            border: 8px solid #333;
            transition: background-color 0.3s ease;
        }

        /* Vistas Internas (Controlan el Scroll) */
        .view {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
            padding-bottom: 120px; 
            height: 100%;
            overflow-y: auto; 
            overflow-x: hidden;
        }
        
        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cabecera y Botones */
        .header { text-align: center; padding: 40px 20px 20px; }
        .logo { font-family: 'Cinzel', serif; font-size: 28px; color: var(--text-dark); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logo i { color: var(--gold-dark); font-size: 20px; }
        .subtitle { color: var(--text-dark); font-size: 16px; margin-bottom: 25px; line-height: 1.4; }
        .btn-main { background: linear-gradient(to right, var(--gold-light), var(--gold-dark)); color: var(--white); border: none; width: 90%; padding: 15px; border-radius: 30px; font-size: 14px; font-weight: 700; letter-spacing: 1px; cursor: pointer; box-shadow: 0 4px 10px rgba(185, 139, 88, 0.4); margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto; transition: transform 0.2s;}
        .btn-main:active { transform: scale(0.98); }

        /* Cuadrícula de opciones */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-bottom: 15px; }
        .card { background-color: var(--white); border-radius: 20px; padding: 20px 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card i { font-size: 30px; color: var(--gold-dark); margin-bottom: 10px; }
        .card p { font-size: 12px; color: var(--text-dark); font-weight: 600; }
        .wide-card { background-color: var(--white); margin: 0 20px 20px; border-radius: 20px; padding: 15px 20px; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .wide-card i { font-size: 28px; color: var(--gold-dark); }
        .wide-card p { font-size: 13px; color: var(--text-dark); font-weight: 600; text-align: left; }

        /* Navegación Inferior Fija */
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: flex-end; padding: 10px 20px 20px; border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 999; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; cursor: pointer; text-decoration: none; width: 50px; }
        .nav-item i { font-size: 18px; margin-bottom: 5px; }
        .nav-item.active { color: var(--gold-dark); }
        .nav-center { position: relative; top: -20px; }
        .nav-center .circle { background: linear-gradient(to bottom right, var(--gold-light), var(--gold-dark)); width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(185, 139, 88, 0.5); border: 4px solid var(--white); }
        .nav-center i { color: var(--white); font-size: 24px; margin: 0; }

        /* Cabeceras Interiores */
        .inner-header { padding: 30px 20px 10px; display: flex; align-items: center; gap: 15px; }
        .btn-back { background: none; border: none; font-size: 18px; color: inherit; cursor: pointer; z-index: 2; position: relative;}
        
        /* Test de Estrés */
        #view-test { background-color: var(--bg-color); }
        .test-title { font-family: 'Cinzel', serif; font-size: 20px; color: var(--text-dark); }
        .test-subtitle { text-align: center; font-size: 13px; color: var(--gold-dark); font-weight: 700; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .question-box { background: var(--white); margin: 0 20px 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .question-text { font-size: 14px; color: var(--text-dark); font-weight: 600; margin-bottom: 15px; line-height: 1.5; }
        .options-group { display: flex; gap: 20px; justify-content: center; }
        .radio-label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
        .scale-group { display: flex; justify-content: space-between; margin-top: 10px; }
        .scale-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 12px; font-weight: bold; color: #555; }
        .scale-item input { width: 18px; height: 18px; accent-color: var(--gold-dark); }
        .sub-question { margin-top: 20px; padding-top: 15px; border-top: 1px solid #f0f0f0; }
        .sub-question p { font-size: 13px; color: var(--text-dark); font-weight: 600; margin-bottom: 12px; }

        /* Organizador, Playlists y Cronómetro (Menta) */
        #view-tasks, #view-playlists, #view-timer { background: linear-gradient(to bottom, #e3f5f1, #bde3dc); }
        #view-tasks .inner-header, #view-playlists .inner-header, #view-timer .inner-header { color: var(--teal-dark); }
        .tasks-header-content { text-align: center; margin-bottom: 20px; color: var(--teal-dark); margin-top: -30px; }
        .tasks-logo { font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .tasks-title { font-size: 24px; font-weight: 800; line-height: 1.1; letter-spacing: -0.5px; }
        .task-card { background-color: var(--white); margin: 0 20px 15px; border-radius: 20px; padding: 15px 18px; box-shadow: 0 4px 15px rgba(30, 70, 64, 0.08); position: relative; overflow: hidden; }
        .task-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .task-card-title { font-size: 15px; font-weight: 800; color: var(--text-dark); }
        .task-card-subtitle { font-size: 12px; font-weight: 600; color: #666; display: block; margin-top: 2px; }
        .progress-pill { width: 45px; height: 12px; background-color: #e0e0e0; border-radius: 10px; overflow: hidden; display: flex; }
        .progress-pill .fill { height: 100%; background-color: var(--teal-btn); width: 30%; }
        .progress-pill .fill-2 { width: 60%; background-color: var(--teal-btn); }
        .progress-pill .fill-3 { width: 100%; background-color: var(--teal-btn); }
        .task-list { list-style: none; }
        .task-list li { margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; }
        .task-list input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid var(--teal-light); border-radius: 50%; outline: none; cursor: pointer; position: relative; flex-shrink: 0; margin-top: 2px; background-color: var(--white); }
        .task-list input[type="checkbox"]:checked { background-color: var(--teal-btn); border-color: var(--teal-btn); }
        .task-list input[type="checkbox"]:checked::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: white; font-size: 12px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .task-text { font-size: 12px; color: var(--text-dark); line-height: 1.3; }
        .task-text strong { font-weight: 800; }
        .card-icon { position: absolute; bottom: 15px; right: 15px; font-size: 35px; color: var(--teal-light); opacity: 0.6; }
        .focus-mode { text-align: center; font-size: 13px; font-weight: 700; color: var(--teal-dark); margin: 20px 0 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
