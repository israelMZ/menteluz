<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenteLuz - Web App</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Colores Base */
            --bg-color: #FAEEE0;
            --text-dark: #1F2A38;
            --gold-light: #E4C092;
            --gold-dark: #B98B58;
            --white: #FFFFFF;
            
            /* Colores Organizador (Tonos Menta) */
            --mint-bg: #dcf0eb;
            --teal-dark: #1e4640;
            --teal-btn: #4ea896;
            --teal-light: #a8d5cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 850px;
            max-height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 40px;
            border: 8px solid #333;
            transition: background-color 0.3s ease;
        }

        /* Vistas */
        .view {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
            padding-bottom: 90px;
            min-height: 100%;
        }
        
        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cabecera y Botón Principal (Inicio) */
        .header { text-align: center; padding: 40px 20px 20px; }
        .logo { font-family: 'Cinzel', serif; font-size: 28px; color: var(--text-dark); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logo i { color: var(--gold-dark); font-size: 20px; }
        .subtitle { color: var(--text-dark); font-size: 16px; margin-bottom: 25px; line-height: 1.4; }
